<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#2EADA3"/>
  <!-- Peace sign -->
  <circle cx="16" cy="16" r="9" fill="none" stroke="#fff" stroke-width="2.2"/>
  <!-- Vertical line -->
  <line x1="16" y1="7" x2="16" y2="25" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Lower-left spoke -->
  <line x1="16" y1="16" x2="9.5" y2="22.5" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Lower-right spoke -->
  <line x1="16" y1="16" x2="22.5" y2="22.5" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Orange ring -->
  <circle cx="16" cy="16" r="15" fill="none" stroke="#E8721A" stroke-width="2"/>
</svg>
