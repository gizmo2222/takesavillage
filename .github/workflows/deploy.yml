name: Deploy to takesavillage.la

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload via SFTP
        env:
          SSHPASS: ${{ secrets.SFTP_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass > /dev/null 2>&1
          sshpass -e sftp -o StrictHostKeyChecking=no \
            ${{ secrets.SFTP_USER }}@takesavillage.la <<'SFTP'
          put index.html /home/nstrupp/takesavillage.la/index.html
          put logo.png /home/nstrupp/takesavillage.la/logo.png
          SFTP

      - name: Confirm
        run: echo "✅ Deployed to takesavillage.la"
